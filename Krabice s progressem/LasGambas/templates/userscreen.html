<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DefNotGamba</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles-twist.css') }}">
  <style>
    @media screen and (max-aspect-ratio: 9/16) {
      body * {
        display: none !important;
      }
      body::before {
        content: "Otočte své zařízení na šířku";
        display: block;
        text-align: center;
        font-size: 20px;
        color: red;
        margin-top: 50vh;
      }
    }
      .smallbutton {
    font-size: 2.2dvh;
    padding: 1.4dvh 2.4dvh;
    margin: 1dvh;

    border-radius: 2dvh;

    color: #FFD700;
    background: rgba(255, 0, 0, 0.4);
    border: 0.3dvh solid #ffd900;
    cursor: pointer;
  }
  .smallbutton:hover {
    color:white;
  }
    .back-button {
    position: fixed;
    top: 6dvh;
    left: 6dvh;

    width: 20dvh;
    height: 8dvh;

    padding: 1.5dvh 3dvh;
    font-size: 2.2dvh;
    font-weight: bold;

    color: #FFD700;
    background: rgba(255, 0, 0, 0.4);

    border: 0.3dvh solid #ffd900;
    border-radius: 2dvh ;

    cursor: pointer;
    z-index: 1000;

    box-shadow: 0 0.5dvh 1.5dvh rgba(0,0,0,0.3);
    transition: all 0.15s ease;
}

.back-button:hover {
    background: rgba(255, 21, 21, 0.6);
    border-color: #FFD700;
    color: white;
    transform: scale(1.1);
}
    </style>
</head>
<body>
    <button class="back-button" onclick="goBack()">← Back</button>
    <div style="position: absolute;left: 5dvh;">
        {{listU | safe}}
    </div>
    <div id="users">
        work
    </div>
</body>
<script>
    let stuff
    async function startup(){
        try {
          const response = await fetch("/twist/fet/userlist");
          if (!response.ok) {
              throw new Error(`HTTP error: ${response.status}`);
          }
          stuff = await response.text()
          console.log(stuff)
      } catch (error) {
          console.error("Fetch error:", error);
      }
      const tableHTML = stuff; 
        document.getElementById(`users`).innerHTML = tableHTML; 
    }
    async function ban(user) {
    try{
      response = await fetch("/twist/fet/userlistaction", {
        method: 'POST',
        headers: {'Content-Type': "application/json"},
        body: JSON.stringify({ 
            "user": user,
            "action": "ban" 
            })
        })
    } catch (error) {
      console.error("Fetch error:", error);
    };
    if (!response.ok) {
      throw new Error(`HTTP error: ${response.status}`);
    }else{
      startup()
    }
    }
    
    async function adminize(user) {
    try{
      response = await fetch("/twist/fet/userlistaction", {
        method: 'POST',
        headers: {'Content-Type': "application/json"},
        body: JSON.stringify({ 
            "user": user,
            "action": "admin" 
            })
        })
    } catch (error) {
      console.error("Fetch error:", error);
    };
    if (!response.ok) {
      throw new Error(`HTTP error: ${response.status}`);
    }else{
      startup()
    }
    }


    window.addEventListener('load', startup)

  
 function goBack() {
    window.history.back();
}
</script>
