<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DefNotGamba</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles-twist.css') }}">
  <style>
    @media screen and (max-aspect-ratio: 9/16) {
      body * {
        display: none !important;
      }
      body::before {
        content: "Otočte své zařízení na šířku";
        display: block;
        text-align: center;
        font-size: 20px;
        color: red;
        margin-top: 50vh;
      }
    }
      button {

          padding: 3vh 7.5vh;
          font-size: 3vh;
          font-weight: bold;

          color: #FFD700;
          background: linear-gradient(135deg,#a30000,#7a0000);

          border: 0.3vh solid #ffd900;
          border-radius: 2vh;

          cursor: pointer;
          z-index: 1000;

          box-shadow: 0 0.5vh 1.5vh rgba(0,0,0,0.3);
          transition: all 0.15s ease;
      }

      button:hover {
          background: linear-gradient(135deg,#c40000,#880808);
          border-color: #FFD700;
          transform: scale(1.1);
          box-shadow: 0 0 4px rgba(255,215,0,0.5);
      }
    </style>
</head>
<body>

    <h2>Round</h2>
    <h1>Defeat!</h1>

    <button onclick="window.location.href = '/twist/house'"> Back to the lobby kid </button>


</body>
</html>
