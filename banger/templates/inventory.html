<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DefNotGamba</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles-twist.css') }}">
  <style>
    @media screen and (max-aspect-ratio: 9/16) {
      body * {
        display: none !important;
      }
      body::before {
        content: "Otočte své zařízení na šířku";
        display: block;
        text-align: center;
        font-size: 20px;
        color: red;
        margin-top: 50vh;
      }
    }

.tiers {
    display: flex;
    justify-content: flex-start;
    gap: 5vh;
    align-items: flex-start;
    margin-left: -30vh;
    margin-top: 15dvh;
    margin-bottom: -15vh;
}

.tiers table {
    width: 40%;
    background: rgba(139, 11, 11, 0.5);
    border-radius: 1vh;
    padding: 1vh;
    backdrop-filter: blur(0.5vh);
    box-shadow: 0 1vh 3vh rgba(0,0,0,0.3);
}
th {
    font-size: 2.5vh;
    padding: 1vh;
    text-align: left;
}
td {
    padding: 0.8vh;
}
tr:hover td {
    background: rgba(255,255,255,0.05);
    border-radius: 0.5vh;
}
.deckbuilder,
.deckbuilderA {
    width: 3.5vh;
    height: 3.5vh;
    border-radius: 0.5vh;
    border: 0.3vh solid rgba(185, 173, 0, 0.705);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s ease;
}
.deckbuilder:active,
.deckbuilderA:active {
    transform: scale(0.9);
}
.deckbuilderA {
    border-color: rgba(255, 100, 100, 0.6);
}


.Bcontainer {
    position: fixed;
    top: 50%;
    right: -171dvh;
    transform: translateY(-50%);

    display: flex;
    flex-direction: column;
    gap: 2dvh;

    z-index: 999;
}

.button {
    padding: 2.5vh 7vh;
    text-decoration: none;
    border: rgba(0, 0, 0, 0.24);
    border-radius: 0.5vh;
    text-align: center;
    font-size: 3vh;

    width: 28dvh;
    height: 15dvh;

    box-shadow: 0 1vh 2vh rgba(0, 0, 0, 0.2);
    transition: background-color 0.3s ease;
    cursor: pointer;
}

    #deckname {
    position: absolute;
    top: 2vh;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 4vh;
    font-weight: bold;
}

table {
    width: 40%;
    margin: 1vh;
    font-size: 2vh;

    display: block;
    max-height: 60dvh;
    overflow-y: auto;

    border-collapse: separate;
    border-spacing: 0 1.2vh;
    
}
table::-webkit-scrollbar {
    width: 1vh;
}

table::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.3);
    border-radius: 1vh;
}

table::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, gold, crimson);
    border-radius: 1vh;
}

table::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, orange, red);
}

.back-button {
    position: fixed;
    top: 2vh;
    left: 2vh;

    padding: 1.5vh 3vh;
    font-size: 2.2vh;
    font-weight: bold;

    color: #FFD700;
    background: rgba(255, 0, 0, 0.4);

    border: 0.3vh solid #ffd900;
    border-radius: 2vh;

    cursor: pointer;
    z-index: 1000;

    box-shadow: 0 0.5vh 1.5vh rgba(0,0,0,0.3);
    transition: all 0.15s ease;
}

.back-button:hover {
    background: rgba(255, 21, 21, 0.6);
    border-color: #FFD700;
    transform: scale(1.1);
}

#deckname {
    position: absolute;
    top: 2vh;
    left: 50%;
    transform: translateX(-50%);

    text-align: center;

    font-size: 5vh;
    font-weight: bold;

    color: gold;
    text-shadow: 
        0 0 1vh rgba(231, 183, 8, 0.8),
        0 0 2vh rgba(255, 100, 0, 0.6);
}


</style>
</head>

<body>

<button class="back-button" onclick="goBack()">← Back</button>

<div class="tiers">

<div id="inventory">
        work</div>

</div>

<p id="deckname"></p>
<p style="position: absolute;left: 10dvh; visibility: hidden;" id="decknumber"></p>

<div class="container-deck">
<img src="" class="gif" id="slot1" onclick="editdeckslot('slot1')">
<img src="" class="gif" id="slot2" onclick="editdeckslot('slot2')">
<img src="" class="gif" id="slot3" onclick="editdeckslot('slot3')">
<img src="" class="gif" id="slot4" onclick="editdeckslot('slot4')">
<img src="" class="gif" id="slotA" onclick="editdeckslot('slotA')">
</div>

<div class="Bcontainer">
<button class="button" onclick="showDeck('deck1')">1</button>
<button class="button" onclick="showDeck('deck2')">2</button>
<button class="button" onclick="showDeck('deck3')">3</button>
<button class="button" onclick="showDeck('deck4')">4</button>
<button class="button" onclick="showDeck('deck5')">5</button>
</div>

<script src="{{ url_for('static', filename='twist/javas.js') }}"></script>
<script>
let editslot = ""
let picked = ""
let whatdeck = ""

function editdeckslot(deckslot) {
const deckeditbuttons = document.getElementsByClassName("deckbuilder");
const deckeditbuttonsA = document.getElementsByClassName("deckbuilderA");
editslot = deckslot
whatdeck = document.getElementById("decknumber").textContent
if (editslot == "slotA") {
for (let i = 0; i < deckeditbuttonsA.length; i++) {
deckeditbuttonsA[i].style.display = "";
}
}else{
for (let i = 0; i < deckeditbuttons.length; i++) {
deckeditbuttons[i].style.display = "";
}}
}

function pickcard(card) {
picked = card
sendedits(picked,editslot,whatdeck)
}

async function sendedits(cardpicked,slotedit,deckedit) {
try {
const response = await fetch("/twist/fet/deckeditor", {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body:JSON.stringify({ 
"cardpicked": cardpicked,
"slotedited": slotedit, 
"deckedited": deckedit
})
});
if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
const result = await response.text();
loaditemstable("inventory");
await deckshow()
await showDeck(deckedit)
if (result == "Karta již v decku") alert(result)
} catch (error) {
console.error("Fetch error:", error);
}
}

window.addEventListener('load', deckshow);
window.addEventListener('load', loaditemstable("inventory"));

function goBack() {
    window.history.back();
}
</script>
</body>
</html>
