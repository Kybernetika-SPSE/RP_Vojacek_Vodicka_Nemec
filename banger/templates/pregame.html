<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DefNotGamba</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles-twist.css') }}">

<style>

@media screen and (max-aspect-ratio: 9/16) {
  body * {
    display: none !important;
  }
  body::before {
    content: "Otočte své zařízení na šířku";
    display: block;
    text-align: center;
    font-size: 3dvh;
    color: red;
    margin-top: 50dvh;
  }
}

/* název decku */
#deckname{
position:absolute;
top:3dvh;
left:50%;
transform:translateX(-50%);
font-size:5dvh;
font-weight:bold;
color:#FFD700;
text-shadow:0 0 1.5dvh gold;
letter-spacing:0.5dvh;
}

.container-deck{
position:absolute;
top:50%;
left:0;
width:100%;
transform:translateY(-50%);
display:flex;
justify-content:center;
align-items:center;
gap:6dvh;
}

.gif{
height:32dvh;
cursor:pointer;
transition:0.25s;
}

.gif:hover{
transform:scale(1.12);
}

.Bcontainer{
position:absolute;
bottom:4dvh;
left:50%;
transform:translateX(-50%);
display:flex;
gap:2dvh;
}

.button{
padding:1.6dvh 3dvh;
font-size:2.4dvh;
background:#8a0909;
border:0.3dvh solid #FFD700;
color:#FFD700;
border-radius:1dvh;
cursor:pointer;
transition:0.2s;
}

.button:hover{
transform:scale(1.1);
box-shadow:0 0 1.2dvh gold;
}


.start-button{
position:absolute;
right:4dvh;
top:50%;
transform:translateY(-50%);
padding:2.6dvh 6dvh;
font-size:3.2dvh;
background:#a30000;
border:0.4dvh solid #FFD700;
color:#FFD700;
border-radius:1.2dvh;
cursor:pointer;
transition:0.2s;
font-weight:bold;
}

.start-button:hover{
transform:translateY(-50%) scale(1.1);
box-shadow:0 0 2dvh gold;
}

.back-button {
    position: fixed;
    top: 2vh;
    left: 2vh;

    padding: 1.5vh 3vh;
    font-size: 2.2vh;
    font-weight: bold;

    color: #FFD700;
    background: linear-gradient(135deg,#a30000,#7a0000);

    border: 0.3vh solid #ffd900;
    border-radius: 2vh;

    cursor: pointer;
    z-index: 1000;

    box-shadow: 0 0.5vh 1.5vh rgba(0,0,0,0.3);
    transition: all 0.15s ease;
}

.back-button:hover {
    background: linear-gradient(135deg,#c40000,#880808);
    border-color: #FFD700;
    transform: scale(1.1);
    box-shadow: 0 0 4px rgba(255,215,0,0.5);
}

</style>
</head>

<body>

<button class="back-button" onclick="goBack()">← Back</button>

<p id="deckname"></p>
<p style="position: absolute;left: 10dvh; visibility: hidden;" id="decknumber"></p>

<div class="container-deck">
<img src="" alt="enterdatahere" class="gif" id="slot1" onclick="editdeckslot('slot1')">
<img src="" alt="enterdatahere" class="gif" id="slot2" onclick="editdeckslot('slot2')">
<img src="" alt="enterdatahere" class="gif" id="slot3" onclick="editdeckslot('slot3')">
<img src="" alt="enterdatahere" class="gif" id="slot4" onclick="editdeckslot('slot4')">
<img src="" alt="enterdatahere" class="gif" id="slotA" onclick="editdeckslot('slotA')">
</div>

<div class="Bcontainer">
<button class="button" onclick="showDeck('deck1')">1</button>
<button class="button" onclick="showDeck('deck2')">2</button>
<button class="button" onclick="showDeck('deck3')">3</button>
<button class="button" onclick="showDeck('deck4')">4</button>
<button class="button" onclick="showDeck('deck5')">5</button>
</div>

<button class="start-button" onclick="setdeck()">START</button>

<script src="{{ url_for('static', filename='twist/javas.js') }}"></script>

<script>

async function setdeck() {

const s1 = document.getElementById("slot1").alt
const s2 = document.getElementById("slot2").alt
const s3 = document.getElementById("slot3").alt
const s4 = document.getElementById("slot4").alt
const sA = document.getElementById("slotA").alt
const deck = document.getElementById("decknumber").textContent

try {

const response = await fetch("/twist/fet/pregame",{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
"deckNo":deck,
"slot1":s1,
"slot2":s2,
"slot3":s3,
"slot4":s4,
"slotA":sA
})
});

if(!response.ok){
throw new Error(`HTTP error: ${response.status}`);
}

const result = await response.text();

if(result==="ok"){
window.location.href="/twist/twist_game";
}else{
alert(result);
}

}catch(error){
console.error("Fetch error:",error);
}

}

async function loadup(deck){
await deckshow()
showDeck(deck)
}

window.addEventListener('load',()=>loadup("{{ deckNo }}"))

function goBack() {
    window.history.back();
}

</script>

</body>
</html>
